services:
  config-server:
    image: springcommunity/spring-petclinic-config-server
    container_name: ${TJOB_NAME}-config-server
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-I", "http://config-server:8888"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - jenkins_network

  discovery-server:
    image: springcommunity/spring-petclinic-discovery-server
    container_name: ${TJOB_NAME}-discovery-server
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://discovery-server:8761"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - jenkins_network

  customers-service:
    image: springcommunity/spring-petclinic-customers-service
    container_name: ${TJOB_NAME}-customers-service
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - jenkins_network

  visits-service:
    image: springcommunity/spring-petclinic-visits-service
    container_name: ${TJOB_NAME}-visits-service
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - jenkins_network

  vets-service:
    image: springcommunity/spring-petclinic-vets-service
    container_name: ${TJOB_NAME}-vets-service
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - jenkins_network

  genai-service:
    image: springcommunity/spring-petclinic-genai-service
    container_name: ${TJOB_NAME}-genai-service
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - jenkins_network

  api-gateway:
    image: springcommunity/spring-petclinic-api-gateway
    container_name: ${TJOB_NAME}-api-gateway
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
      - ${frontend_port}:8080
    networks:
      - jenkins_network

  tracing-server:
    image: openzipkin/zipkin
    container_name: ${TJOB_NAME}-tracing-server
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - jenkins_network

  admin-server:
    image: springcommunity/spring-petclinic-admin-server
    container_name: ${TJOB_NAME}-admin-server
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    networks:
      - jenkins_network

  ## Grafana / Prometheus

  grafana-server:
    build: ./spring-petclinic-microservices/docker/grafana
    container_name: ${TJOB_NAME}-grafana-server
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - jenkins_network

  prometheus-server:
    build: ./spring-petclinic-microservices/docker/prometheus
    container_name: ${TJOB_NAME}-prometheus-server
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - jenkins_network

networks:
  jenkins_network:
    external: true
